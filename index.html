<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Math Speed Challenge</title>
<style>
    body{
        margin:0;
        font-family: Arial;
        background: linear-gradient(135deg,#4facfe,#00f2fe);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        transition: background 0.3s ease;
    }
    .game-container{
        background:white;
        padding:30px;
        border-radius:15px;
        width:350px;
        text-align:center;
        box-shadow:0 10px 30px rgba(0,0,0,0.2);
        transition: background 0.3s ease;
    }
    h1{margin-bottom:20px;}
    .top-bar{
        display:flex;
        justify-content:space-between;
        margin-bottom:20px;
        font-weight:bold;
    }
    .question-box{
        background:#f1f3ff;
        padding:20px;
        border-radius:10px;
        margin:15px 0;
        font-size:24px;
    }
    input{
        width:80%;
        padding:10px;
        font-size:16px;
        margin-top:10px;
        border-radius:5px;
        border:1px solid #ccc;
    }
    button{
        margin-top:15px;
        padding:10px 20px;
        font-size:16px;
        border:none;
        background:#4facfe;
        color:white;
        border-radius:5px;
        cursor:pointer;
    }
    button:hover{background:#0077ff;}
    .best-score{
        margin-top:15px;
        font-weight:bold;
    }
    /* Final Score Screen */
    .game-over-screen{
        display:none;
        background:#fff;
        padding:30px;
        border-radius:15px;
        text-align:center;
        box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }
</style>
</head>
<body>

<div class="game-container" id="game-container">
    <h1>🧠 Math Speed Challenge</h1>

    <div class="top-bar">
        <div>🏆 Score: <span id="score">0</span></div>
        <div>❤️ Lives: <span id="lives">3</span></div>
        <div>⏱ Time: <span id="time">5</span></div>
    </div>

    <div class="difficulty">
        <label>Difficulty</label>
        <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>
    </div>

    <div class="question-box">
        <h2 id="question"></h2>
    </div>

    <input id="answer" type="number" placeholder="Enter answer">
    <br><br>
    <button onclick="checkAnswer()">Submit</button>

    <p class="best-score">Best Score: <span id="best">0</span></p>
</div>

<!-- Game Over Screen -->
<div class="game-over-screen" id="game-over-screen">
    <h1>Game Over!</h1>
    <p>Your Score: <span id="final-score">0</span></p>
    <p>Best Score: <span id="final-best">0</span></p>
    <button onclick="restartGame()">Play Again</button>
</div>

<script>
let combo=0, score=0, lives=3, time=5;
let question, answer, timer;

// Best score
document.getElementById("best").innerText = localStorage.getItem("bestScore") || 0;

// First question
generateQuestion();

// Random number based on difficulty
function getNumber(){
    let level = document.getElementById("difficulty").value;
    if(level=="easy") return Math.floor(Math.random()*10)+1;
    if(level=="medium") return Math.floor(Math.random()*50)+1;
    if(level=="hard") return Math.floor(Math.random()*100)+1;
}

// Generate question
function generateQuestion(){
    let a=Math.floor(Math.random()*10)+1;
    let b=Math.floor(Math.random()*10)+1;

    if(score<10){
        let ops=["+","-"];
        let op=ops[Math.floor(Math.random()*ops.length)];
        question=a+" "+op+" "+b;
    } else if(score<20){
        let ops=["+","-","*","/","%"];
        let op=ops[Math.floor(Math.random()*ops.length)];
        question=a+" "+op+" "+b;
    } else{
        let c=Math.floor(Math.random()*10)+1;
        let ops=["+","-","*"];
        let op1=ops[Math.floor(Math.random()*3)];
        let op2=ops[Math.floor(Math.random()*3)];
        question=a+" "+op1+" "+b+" "+op2+" "+c;
    }

    answer=Math.floor(eval(question));
    document.getElementById("question").innerText=question;
    document.getElementById("answer").focus();
    startTimer();
}

// Timer
function startTimer(){
    clearInterval(timer);
    let t=time;
    document.getElementById("time").innerText=Math.ceil(t);

    timer=setInterval(function(){
        t--;
        document.getElementById("time").innerText=Math.ceil(t);
        if(t<=0){
            loseLife();
        }
    },1000);
}

// Check answer
function checkAnswer(){
    let user=Number(document.getElementById("answer").value);
    const container=document.getElementById("game-container");

    if(user===answer){
        combo++;
        score+=combo;
        document.getElementById("score").innerText=score;

        // Green flash
        container.style.backgroundColor="#c8f7c5";
        setTimeout(()=>{container.style.backgroundColor="white";},200);

        time=Math.max(2,time-1);
        generateQuestion();
    } else{
        combo=0;

        // Red flash
        container.style.backgroundColor="#f7c5c5";
        setTimeout(()=>{container.style.backgroundColor="white";},200);

        loseLife();
    }
    document.getElementById("answer").value="";
}

// Lose life
function loseLife(){
    lives--;
    document.getElementById("lives").innerText=lives;
    if(lives<=0){
        gameOver();
    } else{
        generateQuestion();
    }
}

// Enter key listener
document.getElementById("answer").addEventListener("keypress", function(event){
    if(event.key==="Enter"){
        checkAnswer();
    }
});

// Game over
function gameOver(){
    clearInterval(timer);
    // Show Game Over screen
    document.getElementById("game-container").style.display="none";
    document.getElementById("game-over-screen").style.display="block";

    // Show scores
    document.getElementById("final-score").innerText=score;
    let best=localStorage.getItem("bestScore");
    if(best==null || score>best){ localStorage.setItem("bestScore",score); best=score; }
    document.getElementById("final-best").innerText=best;
}

// Restart game
function restartGame(){
    score=0; combo=0; lives=3; time=5;
    document.getElementById("score").innerText=score;
    document.getElementById("lives").innerText=lives;

    document.getElementById("game-over-screen").style.display="none";
    document.getElementById("game-container").style.display="block";

    generateQuestion();
}
</script>
</body>
</html>
